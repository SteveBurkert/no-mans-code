# Kotlin/Java Android projects. Same parsing as jvm, plus Android build noise skipped
# and detection via the manifest.

name: Kotlin/Java (Android)
extensions: kt, java
detect: */src/main/AndroidManifest.xml, src/main/AndroidManifest.xml

skipDirs: build, out, target, .git, .gradle, .idea, node_modules, .cxx, captures
includePath: (^|/)src/[^/]+/
testPath: (^|/)src/[^/]*[tT]est

module: srcParent
packageFrom: declaration
packageRegex: ^\s*package\s+([\w.]+)
importRegex: ^\s*import\s+(?:static\s+)?([\w.*]+)
declarationRegex: ^(?:(?:public|private|protected|internal|abstract|final|open|sealed|data|value|inline|annotation|static|expect|actual|fun)\s+)*(?:enum\s+class|class|interface|object|@interface|record|enum)\s+(\w+)
memberRegex: ^(?:(?:public|private|protected|internal|open|suspend|inline|operator|infix|external|expect|actual|const|lateinit|tailrec|override)\s+)*(?:fun|val|var)\s+(?:<[^>]+>\s+)?([^\s(:=]+)
samePackage: on
