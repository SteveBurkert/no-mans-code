# Blank config with every key. Copy it, fill in the required block, uncomment what you
# need; README.md next to this file explains every key. Values are taken verbatim
# (regexes need no escaping), '#' comments whole lines only. Check the result with:
#   ./depgraph -p <project> -c yourfile.conf --stats

# Required. Regexes apply per line; the first capture group is what counts.
extensions: myext
importRegex: ^\s*import\s+([\w.*]+)
declarationRegex: ^\s*class\s+(\w+)

# Required with 'packageFrom: declaration' (the default); remove it for 'packageFrom: path'.
packageRegex: ^\s*package\s+([\w.]+)

# Display name in terminal output (default: this file's name).
#name: My Language

# Marker files for auto-detection ('*/x' looks in direct child directories instead).
# Only the built-in configs are auto-detected; in your own file this has no effect.
#detect: my.build.file

# Directory names never scanned (dot-directories are always skipped).
#skipDirs: build, dist, out, node_modules

# Only files whose project-relative path matches this are taken.
#includePath: (^|/)src/

# Matching paths are test sources, skipped unless --tests is passed.
#testPath: (^|/)tests?(/|$)

# What a module (= one star cluster) is: srcParent (path up to /src/) or topPackage.
#module: srcParent

# Where a file's package comes from: declaration (packageRegex) or path (file location).
#packageFrom: declaration

# packageFrom path only: leading directory dropped before the path becomes a dotted name.
#stripRoots: src

# Group 1: top-level members (functions, constants) importable from other files.
#memberRegex: ^([A-Za-z_]\w*)\s*=

# Link same-package files by name mention alone: on where no import is needed between
# them (JVM style), off where imports are always required (python style).
#samePackage: on

# Look and feel, all optional; the values here are the tuned defaults.
# Star size: minStarSize + starScale * (lines / 200) ^ starPower, capped at maxStarSize.
#look.minStarSize: 1.8
#look.starScale: 1.9
#look.starPower: 1.55
#look.maxStarSize: 60
# Dependency lines: brightness, and visible distance as a fraction of the graph radius.
#look.edgeBrightness: 0.21
#look.edgeFade: 0.85
# Star wobble amplitude and nebula haze intensities.
#look.drift: 1.4
#look.hazePackage: 0.022
#look.hazeModule: 0.012
# Spacings: module distances, blob radii per file count, blob gap, branch-view layout.
#look.moduleSpacing: 880
#look.clusterSpacing: 24
#look.packageSpacing: 7
#look.clusterGap: 2.6
#look.branchSpacing: 55
