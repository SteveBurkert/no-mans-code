# Kotlin and Java projects with the standard Gradle/Maven src layout.
# Every 'key: value' line takes the value verbatim - regexes need no escaping.

name: Kotlin/Java
extensions: kt, java
detect: settings.gradle.kts, settings.gradle, build.gradle.kts, build.gradle, pom.xml

skipDirs: build, out, target, .git, .gradle, .idea, node_modules
includePath: (^|/)src/[^/]+/
testPath: (^|/)src/[^/]*[tT]est

# module = cluster in space. srcParent: the folder above /src/. topPackage: first package segment.
module: srcParent
# packageFrom declaration: a package statement in the file. path: derived from the file path.
packageFrom: declaration
packageRegex: ^\s*package\s+([\w.]+)
importRegex: ^\s*import\s+(?:static\s+)?([\w.*]+)
declarationRegex: ^(?:(?:public|private|protected|internal|abstract|final|open|sealed|data|value|inline|annotation|static|expect|actual|fun)\s+)*(?:enum\s+class|class|interface|object|@interface|record|enum)\s+(\w+)
memberRegex: ^(?:(?:public|private|protected|internal|open|suspend|inline|operator|infix|external|expect|actual|const|lateinit|tailrec|override)\s+)*(?:fun|val|var)\s+(?:<[^>]+>\s+)?([^\s(:=]+)
# files in the same package may reference each other without an import
samePackage: on

# Look and feel - every key is optional, these are the defaults.
#look.minStarSize: 1.8
#look.starScale: 1.9
#look.starPower: 1.55
#look.maxStarSize: 60
#look.edgeBrightness: 0.21
#look.edgeFade: 0.85
#look.drift: 1.4
#look.hazePackage: 0.022
#look.hazeModule: 0.012
#look.moduleSpacing: 880
#look.clusterSpacing: 24
#look.packageSpacing: 7
#look.clusterGap: 2.6
#look.branchSpacing: 55
