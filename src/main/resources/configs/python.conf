# Python projects. Files have no package statement, so names come from the file path:
# alpha/core.py is alpha.core, a package's __init__.py is the package itself.

name: Python
extensions: py
detect: pyproject.toml, setup.py, setup.cfg, requirements.txt

skipDirs: .git, .venv, venv, env, __pycache__, .tox, .mypy_cache, .pytest_cache, .eggs, site-packages, build, dist, node_modules, .idea
testPath: (^|/)tests?(/|$)|(^|/)test_[^/]*$|_test\.py$|(^|/)conftest\.py$

module: topPackage
packageFrom: path
# drop these leading directories before turning the path into a dotted name
stripRoots: src
importRegex: ^\s*(?:import|from)\s+([.\w]+)(?:\s+import\s+([\w.*, ]+))?
declarationRegex: ^(?:async\s+def|class|def)\s+(\w+)
memberRegex: ^([A-Za-z_]\w*)\s*(?::[^=\n]*)?=(?!=)
# Python needs an import even inside the same package, so name matching would only add noise
samePackage: off
